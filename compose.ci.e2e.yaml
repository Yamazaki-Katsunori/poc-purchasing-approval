services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h db -p 5432",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/services/workspace/Dockerfile
      target: ci-backend
    working_dir: /workspaces/app/backend
    environment:
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    # volumes:
    #   - .:/workspaces/app
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn src.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: docker/services/workspace/Dockerfile
      target: ci-frontend
    working_dir: /workspaces/app/frontend
    # volumes:
    #   - .:/workspaces/app
    depends_on:
      - backend
    command: pnpm dev

  web:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./docker/services/web/nginx/default.ci.conf:/etc/nginx/conf.d/default.conf:ro
      # - .:/workspaces/app:ro
    depends_on:
      - frontend
      - backend
