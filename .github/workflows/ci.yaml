name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff/mypy/pyright/pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Ruff format (check)
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: |
          uv run pytest -q || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "No tests collected. Skipping."
            exit 0
          fi
          exit "${code:-0}"

  frontend:
    name: frontend (prettier/eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prettier (check)
        run: pnpm -s prettier --check .

      - name: ESLint
        run: pnpm -s eslint .
