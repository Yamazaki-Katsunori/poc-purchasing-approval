services:
  db:
    image: postgres:18
    env_file:
      - .env.ci
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h db -p 5432",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/services/workspace/Dockerfile
    working_dir: /workspaces/app/backend
    env_file:
      - .env.ci
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-app}
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
    volumes:
      - .:/workspaces/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        uv sync --dev &&
        uv run alembic upgrade head &&
        uv run python -m src.scripts.seeds.run_all_seeds &&
        uv run uvicorn src.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: .
      dockerfile: docker/services/workspace/Dockerfile
    working_dir: /workspaces/app/frontend
    volumes:
      - .:/workspaces/app
    command: >
      sh -c "
        pnpm install --frozen-lockfile &&
        pnpm dev --host 0.0.0.0 --port 3000
      "
    depends_on:
      - backend

  web:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./docker/services/web/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/workspaces/app:ro
    depends_on:
      - frontend
      - backend
