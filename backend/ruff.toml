# backend/ruff.toml
line-length = 120
target-version = "py314"

# 生成物 / 仮想環境 / migration 等は除外
exclude = [
  ".venv",
  ".mypy_cache",
  ".ruff_cache",
  "__pycache__",
  "alembic/versions",
]

[lint]
# まずは最低限（E/F）+ import整形（I）+ 近代化（UP）+ よくあるバグ（B）
select = ["E", "F", "I", "UP", "B"]
ignore = [
  "E501", # line-length は formatter に寄せるなら無効化でOK
]

[lint.isort]
known-first-party = ["app"] # あなたのパッケージ名に合わせて変更（例: "backend", "src" など）
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[lint.per-file-ignores]
# テストは未使用 import や assert などが出がちなので緩める（必要なら）
"tests/**.py" = ["F401"]
