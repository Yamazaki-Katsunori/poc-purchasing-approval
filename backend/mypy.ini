# backend/mypy.ini
[mypy]
python_version = 3.14
pretty = True
show_error_codes = True
explicit_package_bases = True

# まずは「型の穴を減らす」程度の現実的な設定
warn_return_any = True
warn_unused_ignores = True
no_implicit_optional = True
check_untyped_defs = True

# 移行しやすいように strict まではしない（必要なら後で strict = True）
# strict = True

# キャッシュ/生成物除外
exclude = ^(\.venv | \.mypy_cache | alembic/versions)

# 依存ライブラリの型が無い場合に詰まるのを避ける（CIを止めにくくする）
ignore_missing_imports = True

# SQLAlchemy 2.x の型補助（使ってるなら有効化）
plugins = sqlalchemy.ext.mypy.plugin
